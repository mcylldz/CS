[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://connect.facebook.net https://www.googletagmanager.com https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://static.cloudflareinsights.com blob:; frame-src https://js.stripe.com blob: https://mc.yandex.ru https://mc.yandex.com; child-src blob: https://mc.yandex.ru https://mc.yandex.com; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.shopify.com https://*.shopifycdn.com https://mc.yandex.ru https://mc.yandex.com https://www.facebook.com https://www.google-analytics.com; connect-src 'self' https://api.stripe.com https://*.facebook.com https://*.facebook.net https://*.a.run.app https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://cloudflareinsights.com wss://mc.yandex.ru wss://mc.yandex.com"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
