    <h1 class="sc-success-title">Siparişiniz Alındı!</h1>
    <p class="sc-success-subtitle">
      Teşekkür ederiz. Siparişiniz başarıyla oluşturuldu.<br>
      Sipariş detayları e-posta adresinize gönderilecektir.
    </p>

    <div class="sc-success-details">
      <div class="sc-success-row">
        <span>Sipariş Numarası</span>
        <span id="orderNumber">—</span>
      </div>
      <div class="sc-success-row">
        <span>E-posta</span>
        <span id="orderEmail">—</span>
      </div>
      <div class="sc-success-row">
        <span>Toplam</span>
        <span id="orderTotal">—</span>
      </div>
    </div>

    <div id="agreementLinkWrap" style="display:none; margin-bottom:24px;">
      <a id="agreementLink" href="#" style="display:inline-block; padding:12px 28px; font-size:13px; font-weight:500; color:#b5a07c; border:1px solid #b5a07c; border-radius:6px; text-decoration:none; transition:all 0.2s; font-family:'Inter',sans-serif;">
        Mesafeli Satış Sözleşmesini Görüntüle
      </a>
    </div>

    <a href="https://www.thesveltechic.com" class="sc-success-btn">Alışverişe Devam Et</a>

    <p class="sc-success-note">
      Sorularınız için <a href="mailto:destek@thesveltechic.com" style="color:#b5a07c;">destek@thesveltechic.com</a> adresinden bize ulaşabilirsiniz.
    </p>
  </div>

  <script>
    (function() {
      const p = new URLSearchParams(window.location.search);
      var orderName = p.get('order') || '';
      var email = p.get('email') || '';
      var total = p.get('total') || '';

      document.getElementById('orderNumber').textContent = orderName || '\u2014';
      document.getElementById('orderEmail').textContent = email || '\u2014';
      document.getElementById('orderTotal').textContent = total || '\u2014';

      // Always show agreement link if we have order + email
      if (orderName && email) {
        var agreementUrl = '/api/get-agreement?order=' + encodeURIComponent(orderName) + '&email=' + encodeURIComponent(email);
        document.getElementById('agreementLink').href = agreementUrl;
        document.getElementById('agreementLinkWrap').style.display = 'block';
      }

      // GA4: purchase event (backup — deduplicates with checkout.js via same transaction_id)
      var txnId = p.get('txn') || '';
      var orderValue = parseFloat(p.get('value') || '0');
      if (txnId && orderValue > 0 && typeof gtag === 'function') {
        gtag('event', 'purchase', {
          transaction_id: txnId,
          value: orderValue,
          currency: 'TRY',
          shipping: 0,
          tax: 0
        });
        // Google Ads conversion (backup)
        gtag('event', 'conversion', {
          send_to: 'AW-11536130276/purchase',
          value: orderValue,
          currency: 'TRY',
          transaction_id: txnId
        });
      }

      // Yandex Metrica: order success page goal
      if (orderName) {
        // Parse total from formatted string (e.g. "1.299,00TL" → 1299.00)
        var numericTotal = 0;
        if (total) {
          numericTotal = parseFloat(total.replace(/\./g, '').replace(',', '.').replace('TL', '')) || 0;
        }
        try {
          if (typeof ym !== 'undefined') {
            ym(108350862, 'reachGoal', 'order_success_page', {
              order_id: orderName,
              order_price: numericTotal,
              currency: 'TRY'
            });
          }
        } catch (e) {}
      }
    })();
  </script>

  <!-- Meta Pixel: backup Purchase event (same eventID as checkout.js for deduplication) -->
  <script>

    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '436434139143285');
    (function(){
      var p = new URLSearchParams(window.location.search);
      var eid = p.get('eid');
      var val = parseFloat(p.get('value'));
      if (eid && val > 0) {
        fbq('track', 'Purchase', {
          value: val, currency: 'TRY', content_type: 'product'
        }, { eventID: eid });
      }
    })();
  </script>
